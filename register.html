<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawDiary - Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

<!-- BACKGROUND ANIMALS -->
<div class="bg-pattern">
    <div class="bg-animal">🐶</div>
    <div class="bg-animal">🐱</div>
    <div class="bg-animal">🐹</div>
    <div class="bg-animal">🐰</div>
    <div class="bg-animal">🐶</div>
    <div class="bg-animal">🐱</div>
    <div class="bg-animal">🐹</div>
    <div class="bg-animal">🐰</div>
    <div class="bg-animal">🐶</div>
    <div class="bg-animal">🐱</div>
    <div class="bg-animal">🐹</div>
    <div class="bg-animal">🐰</div>
    <div class="paw-print">🐾</div>
    <div class="paw-print">🐾</div>
    <div class="paw-print">🐾</div>
    <div class="paw-print">🐾</div>
</div>

<!-- REGISTER CARD -->
<div class="register-card">
    <div class="top-animals">🐱🐾🐶</div>
    <span class="logo-icon">📖</span>
    <h1>PawDiary</h1>
    <p class="tagline">🌸 Join our pet-loving family! 🌸</p>
    <div class="divider">🐾 · 🦴 · 🐾</div>

    <div class="alert-success" id="successMsg" style="display:none;">
        🎉 Account created! You can now login.
    </div>
    <div class="alert-error" id="errorMsg" style="display:none;">
        😿 Username already exists!
    </div>

    <form id="registerForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <div class="show-password">
            <input type="checkbox" id="showPassword">
            <label for="showPassword">Show Password</label>
        </div>
        <button type="submit" class="btn-register">
            Create Account
        </button>
    </form>

    <button class="btn-back" id="backBtn">
        ← Back to Login
    </button>
</div>

<script src="register.js"></script>
</body>
</html>
