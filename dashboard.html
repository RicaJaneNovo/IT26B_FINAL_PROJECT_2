<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawDiary - Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">📖</div>
    <h2>PawDiary</h2>
    <p>Pet Activity Journal</p>

    <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item active">
            <span class="nav-icon">🏠</span> Dashboard
        </a>

        <a href="pets.html" class="nav-item">
            <span class="nav-icon">🐶</span> My Pets
        </a>

        <a href="activities.html" class="nav-item">
            <span class="nav-icon">📋</span> Activities
        </a>

        <a href="health.html" class="nav-item">
            <span class="nav-icon">🏥</span> Health Records
        </a>

        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span> My Profile
        </a>
    </nav>

    <button class="logout-btn" id="logoutBtn">
        🚪 Logout
    </button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- Topbar -->
    <div class="topbar">
        <h1>🐾 Dashboard</h1>

        <div class="welcome">
            Welcome back,
            <span id="welcomeUser">User</span>! 🌸
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="cards">

        <div class="card">
            <div class="card-icon">🐶</div>
            <div class="card-count" id="totalPets">0</div>
            <div class="card-label">Total Pets</div>
        </div>

        <div class="card">
            <div class="card-icon">📋</div>
            <div class="card-count" id="totalActivities">0</div>
            <div class="card-label">Total Activities</div>
        </div>

        <div class="card">
            <div class="card-icon">🏥</div>
            <div class="card-count" id="totalHealth">0</div>
            <div class="card-label">Health Records</div>
        </div>

    </div>

    <!-- CONTENT -->
    <div class="panel">
        <h3>🐾 Welcome to PawDiary Dashboard</h3>

        <p>
            Your pet activity monitoring system is now connected successfully.
        </p>
    </div>

</div>

<!-- LOGIN CONNECTION SCRIPT -->
<script>
    // Check login
    const user = localStorage.getItem('pawdiary_user');

    // Redirect if not logged in
    if (!user) {
        window.location.href = 'login.html';
    }

    // Show username
    const welcomeUser = document.getElementById('welcomeUser');

    if (welcomeUser && user) {
        welcomeUser.textContent = user;
    }

    // Logout
    const logoutBtn = document.getElementById('logoutBtn');

    if (logoutBtn) {
        logoutBtn.addEventListener('click', function () {

            // Remove saved login
            localStorage.removeItem('pawdiary_user');

            // Back to login
            window.location.href = 'login.html';
        });
    }
</script>

<script src="dashboard.js"></script>

</body>
</html>
