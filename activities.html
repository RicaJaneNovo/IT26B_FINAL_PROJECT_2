<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawDiary - Activities</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">📖</div>
    <h2>PawDiary</h2>
    <p>Pet Activity Journal</p>
    <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="pets.html"      class="nav-item"><span class="nav-icon">🐶</span> My Pets</a>
        <a href="activities.html" class="nav-item active"><span class="nav-icon">📋</span> Activities</a>
        <a href="health.html"    class="nav-item"><span class="nav-icon">🏥</span> Health Records</a>
        <a href="profile.html"   class="nav-item"><span class="nav-icon">👤</span> My Profile</a>
    </nav>
    <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
</div>

<div class="main">
    <div class="topbar">
        <h1>📋 Activities</h1>
    </div>

    <div id="alertBox"></div>

    <!-- LOG ACTIVITY -->
    <div class="panel">
        <h3>➕ Log New Activity</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Select Pet</label>
                <select id="actPet">
                    <option value="">-- Choose a pet --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Activity Type</label>
                <select id="actType">
                    <option value="Feeding">🍖 Feeding</option>
                    <option value="Walking">🚶 Walking</option>
                    <option value="Grooming">✂️ Grooming</option>
                    <option value="Playing">🎾 Playing</option>
                    <option value="Training">🏋️ Training</option>
                    <option value="Bathing">🛁 Bathing</option>
                    <option value="Other">🐾 Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="actDate">
            </div>
            <div class="form-group full">
                <label>Description</label>
                <textarea id="actDesc" placeholder="Describe the activity..."></textarea>
            </div>
        </div>
        <button class="btn-primary" id="logActBtn" style="margin-top:18px;">
            📋 Log Activity
        </button>
    </div>

    <!-- ACTIVITY LOG -->
    <div class="panel" style="overflow-x: auto;">
        <h3>📋 Activity Log</h3>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" type="text" id="actSearch"
                placeholder="Search activity..." oninput="filterActivities()">
        </div>
        <table id="actTable">
            <thead>
                <tr>
                    <th onclick="sortTable('actTable',0)">Pet ⬍</th>
                    <th onclick="sortTable('actTable',1)">Activity ⬍</th>
                    <th>Description</th>
                    <th onclick="sortTable('actTable',3)">Date ⬍</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="actTableBody"></tbody>
        </table>
        <div class="no-data" id="noActs">📋 No activities logged yet!</div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3>✏️ Edit Activity</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Pet</label>
                <select id="editActPet"></select>
            </div>
            <div class="form-group">
                <label>Activity Type</label>
                <select id="editActType">
                    <option value="Feeding">🍖 Feeding</option>
                    <option value="Walking">🚶 Walking</option>
                    <option value="Grooming">✂️ Grooming</option>
                    <option value="Playing">🎾 Playing</option>
                    <option value="Training">🏋️ Training</option>
                    <option value="Bathing">🛁 Bathing</option>
                    <option value="Other">🐾 Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="editActDate">
            </div>
            <div class="form-group full">
                <label>Description</label>
                <textarea id="editActDesc"></textarea>
            </div>
        </div>
        <div class="modal-btns">
            <button class="btn-primary" id="saveEditBtn">💾 Save</button>
            <button class="btn-cancel"  id="closeEditBtn">Cancel</button>
        </div>
    </div>
</div>

<script src="activities.js"></script>
</body>
</html>
